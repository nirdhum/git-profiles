<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Git Profiles</title>
</head>

<body>
    <form class="user-form" id="form">
        <input type="text" id="search" placeholder="Search a Github User">
    </form>

    <main id="main">
        <div class="card">
            <div>
                <img src="https://randomuser.me/api/portraits/men/10.jpg" alt="" class="avatar">
            </div>
            <div class="user-info">
                <h2>Nirdhum</h2>
                <p>Lorem ipsum dolor sit amet consectetur adipisicing elit, fugiat molestias totam? Quasi fugiat animi
                    ab minima! Eos!</p>

                <ul>
                    <li>100 <strong>Followers</strong></li>
                    <li>300 <strong>Following</strong></li>
                    <li>10 <strong>Repositories</strong></li>
                </ul>

                <div id="repos">
                    <a href="" class="repo">Repo 1</a>
                    <a href="" class="repo">Repo 2</a>
                    <a href="" class="repo">Repo 3</a>
                    <a href="" class="repo">Repo 4</a>
                    <a href="" class="repo">Repo 5</a>
                </div>
            </div>
        </div>
    </main>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/axios/1.4.0/axios.min.js"
        integrity="sha512-uMtXmF28A2Ab/JJO2t/vYhlaa/3ahUOgj1Zf27M5rOo8/+fcTUVH0/E0ll68njmjrLqOBjXM3V9NiPFL5ywWPQ=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="script.js"></script>
</body>

</html>
